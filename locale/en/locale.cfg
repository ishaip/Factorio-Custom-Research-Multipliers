[mod-name]
title=Custom Research Multipliers

[mod-description]
description=Fully customizable research cost multipliers. Multiply cycle counts with global and infinite category multipliers, or scale individual science pack costs per cycle. Works with science packs from any mod — base game, Space Age, Space Exploration, Krastorio 2, and more.


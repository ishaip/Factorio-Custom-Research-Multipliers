[mod-setting-description]
global-multiplier=Multiplies the total research cycle count for ALL technologies.\nE.g. set to 7 and a 100-cycle tech becomes 700 cycles. Set to 0.7 and it becomes 70 cycles.
infinite-research-multiplier=Multiplies the total research cycle count for all infinite research.\nStacks with the global multiplier.
scale-time-by-pack-cost=When enabled, research time per cycle scales proportionally to the average pack cost.\nIf pack multipliers increase the number of packs needed, the time per cycle increases by the same factor.\nOnly packs that are part of the original recipe affect the calculation.

automation-science-multiplier=Multiplies [item=automation-science-pack] Automation packs per cycle.\nE.g. set to 2 and a tech needing 1 Automation per cycle will need 2.
logistic-science-multiplier=Multiplies [item=logistic-science-pack] Logistic packs per cycle.
military-science-multiplier=Multiplies [item=military-science-pack] Military packs per cycle.
chemical-science-multiplier=Multiplies [item=chemical-science-pack] Chemical packs per cycle.
